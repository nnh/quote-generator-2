<script type="text/javascript">
  function setConst(){

    mapConst.set('specifiedClinicalTrialValue', 'specifiedClinicalTrial');
    mapConst.set('TrialTypeInvestigatorInitiatedTrial', {value: mapConst.get('investigatorInitiatedTrialValue'), label:'医師主導治験', coefficient: 5});
    mapConst.set('TrialTypeSpecifiedClinicalTrial', {value: mapConst.get('specifiedClinicalTrialValue'), label:'特定臨床研究', coefficient: 3});
    mapConst.set('investigatorInitiatedTrialItemNames', 
      new Map([
        ['irb', 'IRB承認確認、施設管理'],
        ['accountSettings', '初期アカウント設定（施設・ユーザー）'],
        ['centralMonitoring', '中央モニタリング'],

        ['finalAnalysis', '最終解析プログラム作成、解析実施（ダブル）'],
        ['csr', 'CSRの作成支援']
      ])
    );
    mapConst.set('othersItemNames',
      new Map([
        ['irb', 'IRB準備・承認確認'],
        ['accountSettings', '初期アカウント設定（施設・ユーザー）、IRB承認確認'],
        ['centralMonitoring', '中央モニタリング、定期モニタリングレポート作成'],
        ['interimAnalysis', '中間解析プログラム作成、解析実施（シングル）'],
        ['finalAnalysis', '最終解析プログラム作成、解析実施（シングル）'],
        ['csr', '研究結果報告書の作成']
      ])
    );
    return mapConst;
  }
  function roundLower3Digits(target) {
  // Rounded to the nearest thousand yen.
    return target > 1000 ? Math.round(target / 1000) * 1000 : target;
  }
  async function doGetHtml(param = null){
    const baseUrl = await new Promise(resolve => google.script.run.withSuccessHandler(resolve).getAppUrl());
    let paramString = '';
    if (param !== null){
      param.forEach((value, key) => {
        const combiningCharacter = paramString.length > 0 ? '&' : '?';
        paramString = paramString + `${combiningCharacter}${key}=${value}`
      });
    }
    const url = baseUrl.replace(/$/, paramString);
    window.open(url, '_blank');
  }
  function getTargetYear(targetArray, targetId) {
    return targetArray.filter(x => x.id === targetId)[0];
  }
  function getMonthFirstDay(year, month) {
    return new Date(year, month, 1);
  }
  function getPreviousMonthLastDate(year, month) {
    return new Date(year, month - 1, 0);
  }
</script>
